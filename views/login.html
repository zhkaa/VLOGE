<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - VLOGE</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header__content">
                <a href="/" class="logo">
                    <img src="/img/logo/logo.png" alt="VLOGE" class="logo__img">
                </a>
                
                <div class="burger" id="burger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>

                <nav class="nav" id="nav">
                    <a href="/" class="nav__link">Главная</a>
                    <a href="#" class="nav__link">О нас</a>

                    <div class="nav__buttons">
                        <a href="/login" class="btn-login">Войти</a>
                        <a href="/register" class="btn-register">Регистрация</a>
                    </div>
                </nav>

                <div class="header__actions">
                    <a href="/login" class="btn-login">Войти</a>
                    <a href="/register" class="btn-register">Регистрация</a>
                </div>
            </div>
        </div>
    </header>

    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-box">
                <div class="auth-header">
                    <h1 class="auth-title">Вход в аккаунт</h1>
                    <p class="auth-subtitle">Рады видеть вас снова!</p>
                </div>

                <!-- Кнопка входа через Google -->
                <button class="google-btn" id="googleLoginBtn">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M19.6 10.227c0-.709-.064-1.39-.182-2.045H10v3.868h5.382a4.6 4.6 0 01-1.996 3.018v2.51h3.232c1.891-1.742 2.982-4.305 2.982-7.35z" fill="#4285F4"/>
                        <path d="M10 20c2.7 0 4.964-.895 6.618-2.423l-3.232-2.509c-.895.6-2.04.955-3.386.955-2.605 0-4.81-1.76-5.595-4.123H1.064v2.59A9.996 9.996 0 0010 20z" fill="#34A853"/>
                        <path d="M4.405 11.9c-.2-.6-.314-1.24-.314-1.9 0-.66.114-1.3.314-1.9V5.51H1.064A9.996 9.996 0 000 10c0 1.614.386 3.14 1.064 4.49l3.34-2.59z" fill="#FBBC05"/>
                        <path d="M10 3.977c1.468 0 2.786.505 3.823 1.496l2.868-2.868C14.959.99 12.695 0 10 0 6.09 0 2.71 2.24 1.064 5.51l3.34 2.59C5.19 5.736 7.395 3.977 10 3.977z" fill="#EA4335"/>
                    </svg>
                    Войти через Google
                </button>

                <div class="auth-divider">
                    <span>или</span>
                </div>

                <!-- Форма входа -->
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" id="email" name="email" class="form-input" placeholder="example@mail.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" id="password" name="password" class="form-input" placeholder="Введите пароль" required>
                    </div>

                    <div class="form-row">
                        <div class="form-checkbox">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember">Запомнить меня</label>
                        </div>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>

                    <button type="submit" class="auth-submit-btn">Войти</button>
                </form>

                <div class="auth-footer">
                    <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="/js/main.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
